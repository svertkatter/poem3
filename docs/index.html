<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ecoar — あんずよ</title>
<meta property="og:title" content="ecoar — あんずよ">
<meta property="og:description" content="室生犀星「小景異情 その六」。詩に、正解の読みはありません。これは、誰かがさがした読みです。">
<style>
/* ============================================================
   ecoar — 読みの共有ページ／みんなの読み
   展示でのこされた「読み」を、いつでもどこでも開くための紙。
   一覧の表示・見ためは展示アプリの「みんなの読み」と同じにする。
   読み出しに API キーは要らない（publishable な anon キーのみ。RLSの範囲で select / 公開Storageの読み出しだけ）
   ============================================================ */
:root {
  --paper: #f7f2e8;
  --ink: #2e2a24;
  --ink-soft: #7a7164;
  --line: #d8ccb6;
  --voice: #d97b4f;
  --voice-deep: #b85f37;
  --voice-pale: #f5ddc9;
  --echo: #5e8a86;
  --echo-deep: #3f6864;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
  color: var(--ink);
  background:
    radial-gradient(120% 70% at 50% 0%, rgba(255,252,244,0.92), rgba(255,252,244,0) 60%),
    radial-gradient(90% 60% at 85% 100%, rgba(217,123,79,0.16), rgba(217,123,79,0) 55%),
    var(--paper);
  min-height: 100vh;
  position: relative;
}
main {
  position: relative;
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 22px 70px;
  text-align: center;
}
header .brand-word {
  display: inline-flex; align-items: baseline; gap: 7px;
  font-size: 22px; font-weight: 600; letter-spacing: 0.3em;
  color: var(--echo-deep);
}
header .brand-ring { font-size: 12px; letter-spacing: 0; color: var(--echo); opacity: 0.75; }
header .poem-title { margin-top: 8px; font-size: 15px; letter-spacing: 0.14em; color: var(--voice-deep); }
header .poem-source { display: block; margin-top: 4px; font-size: 11.5px; letter-spacing: 0.1em; color: var(--ink-soft); }

.flower { width: 96px; height: 96px; margin: 30px auto 6px; }
.flower.playing svg { animation: sway 1.8s ease-in-out infinite; }
@keyframes sway {
  0%, 100% { transform: rotate(-6deg) scale(1.03); }
  50% { transform: rotate(6deg) scale(1.08); }
}
.flower svg { width: 100%; height: 100%; }

.yomi-name { font-size: 30px; letter-spacing: 0.12em; margin-top: 6px; }
.yomi-meta { font-size: 13px; color: var(--ink-soft); letter-spacing: 0.1em; margin-top: 10px; }

.poem-box { margin: 34px auto 8px; }
.poem-box svg { width: 100%; height: auto; }
.poem-box text {
  font-family: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
}

.play-btn {
  font-family: inherit;
  display: inline-flex; align-items: center; justify-content: center; gap: 12px;
  font-size: 19px; letter-spacing: 0.22em;
  color: #fffaf2;
  background: linear-gradient(160deg, var(--voice), var(--voice-deep));
  border: none; border-radius: 999px;
  padding: 18px 52px;
  margin-top: 26px;
  box-shadow: 0 4px 16px rgba(62,48,28,0.25);
  cursor: pointer;
  transition: transform 0.12s ease;
}
.play-btn:active { transform: scale(0.96); }
.play-btn[disabled] { opacity: 0.5; pointer-events: none; }

.about {
  margin-top: 46px;
  font-size: 13.5px; line-height: 2.2; letter-spacing: 0.08em;
  color: var(--ink-soft);
}
.about b { color: var(--voice-deep); font-weight: 600; }
.status { margin-top: 50px; font-size: 15px; color: var(--ink-soft); letter-spacing: 0.12em; line-height: 2.2; }
footer { margin-top: 60px; font-size: 11.5px; color: var(--ink-soft); letter-spacing: 0.12em; line-height: 2; }
.hidden { display: none; }

/* ---------- みんなの読み（一覧）。展示アプリの「みんなの読み」と同じ、フルページの画面 ---------- */
#list.page {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  background:
    radial-gradient(110% 80% at 50% 0%, rgba(255,252,244,0.92), rgba(255,252,244,0) 60%),
    radial-gradient(90% 70% at 85% 100%, rgba(94,138,134,0.16), rgba(94,138,134,0) 55%),
    var(--paper);
  overflow: hidden;
  z-index: 5;
}
#list.hidden { display: none; }
.page-tree {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none; opacity: 0.4; z-index: 0;
}
.page-head {
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 16px;
  padding: 20px 20px 12px;
  flex: 0 0 auto;
}
.back-link {
  flex: 0 0 auto; font-size: 13px; letter-spacing: 0.08em;
  color: var(--echo-deep); text-decoration: none; white-space: nowrap;
}
.page-head-spacer { flex: 0 0 60px; }
.page-title { flex: 1; text-align: center; }
.page-title h2 { font-size: 21px; letter-spacing: 0.18em; color: var(--echo-deep); }
.page-brand { font-size: 11px; letter-spacing: 0.12em; color: var(--ink-soft); margin-top: 4px; }
.page-brand .brand-ring { color: var(--echo); opacity: 0.75; }
#list-sub { font-size: 12.5px; color: var(--ink-soft); margin-top: 6px; letter-spacing: 0.05em; line-height: 1.7; }
.list-scroll {
  position: relative; z-index: 1;
  flex: 1 1 auto; overflow-y: auto;
  padding: 6px 18px 50px;
  -webkit-overflow-scrolling: touch;
}
.cards-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px; text-align: left;
  max-width: 1100px; margin: 0 auto;
}

/* ---------- QRから開いた歌のすぐ下にも、みんなの読みを並べる ---------- */
.detail-list {
  margin-top: 50px; padding-top: 36px;
  border-top: 1px solid var(--line);
  text-align: center;
}
.detail-list h3 {
  font-size: 18px; letter-spacing: 0.18em; color: var(--echo-deep);
}
.detail-list-sub {
  font-size: 12.5px; color: var(--ink-soft); margin-top: 8px;
  letter-spacing: 0.05em; line-height: 1.7;
}
.detail-list .cards-grid { margin-top: 20px; }

.lib-card {
  position: relative;
  display: flex; align-items: center; gap: 14px;
  font-family: inherit; text-align: left; text-decoration: none; color: inherit;
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 14px 16px;
  transition: transform 0.12s ease;
}
.lib-card:active { transform: scale(0.97); }
.lib-flower { flex: 0 0 60px; height: 60px; }
.lib-flower svg { width: 60px; height: 60px; }
.lib-body { flex: 1; min-width: 0; }
.lib-name { font-size: 18px; color: var(--ink); letter-spacing: 0.05em; }
.lib-meta { font-size: 12px; color: var(--ink-soft); margin-top: 5px; letter-spacing: 0.05em; }
.lib-empty { text-align: center; padding: 34px 0; color: var(--ink-soft); line-height: 2; }
</style>
</head>
<body>

<!-- 一覧（idなしでこのページを開いたとき）。展示アプリの「みんなの読み」と同じ、フルページの画面 -->
<div id="list" class="page hidden">
  <div class="page-tree" id="list-tree"></div>
  <div class="page-head">
    <a href="?" class="back-link">← もどる</a>
    <div class="page-title">
      <h2>みんなの読み</h2>
      <p class="page-brand">ecoar<span class="brand-ring">))</span> ・ あんずよ</p>

  <div class="list-scroll">
    <div id="list-grid" class="cards-grid"></div>
  </div>
</div>

<main id="detail">
  <header>
    <h1 class="brand-word">ecoar<span class="brand-ring">))</span></h1>
    <p class="poem-title">あんずよ<span class="poem-source">室生犀星『抒情小曲集』より「小景異情　その六」</span></p>
  </header>

  <div id="status" class="status">読みをひらいています…</div>

  <section id="yomi" class="hidden">
    <div id="flower" class="flower"></div>
    <div id="yomi-name" class="yomi-name"></div>
    <div id="yomi-meta" class="yomi-meta"></div>
    <div id="poem" class="poem-box"></div>
    <button id="play" class="play-btn"><span id="play-icon">▶</span><span id="play-label">この読みをきく</span></button>

      詩には、俳句や短歌のような決まったリズムがありません。<br>
      どう読んでもいい。だから、わからなくなる。<br>
      これは、誰かが文字をうごかして、なんども聞きながら、<br>
      ようやく<b>しっくりきた「読み」</b>のかたちです。<br>
      文字の高さは声の高さ、文字の伸びは声の伸び。
    </p>

    <div class="detail-list">
      <h3>みんなの読み</h3>
      <p id="detail-list-sub" class="detail-list-sub">読みは、人の数だけ。</p>
      <div id="detail-list-grid" class="cards-grid"></div>
    </div>
  </section>

  <footer>
    詩に、正解の読みはありません。読みは、人の数だけあります。<br>
    展示「ecoar — あんずよ」
  </footer>
</main>

<script>
'use strict';

// 公開ストレージ（読み出しにキーは不要）
const STORAGE = 'https://igtbhusmfsambsoozuef.supabase.co/storage/v1/object/public/readings/';
// 一覧の取得だけは REST 経由（publishable な anon キー。RLS で select のみ許可）
const SUPABASE_URL = 'https://igtbhusmfsambsoozuef.supabase.co';
const SUPABASE_KEY = 'sb_publishable_GfYQTwmQAm9KUxas9Y66fw_OOUtVEiz';

const MOODS = {
  shizuka: { pale: '#eef2f5', main: '#8fa3b8', deep: '#5d7185' },
  attaka:  { pale: '#fdf0e3', main: '#e8a06b', deep: '#c97a3d' },
  moeru:   { pale: '#fbe9e2', main: '#d4502e', deep: '#a33518' },
  hazumu:  { pale: '#f3f5e3', main: '#a8b545', deep: '#76842b' },
  tooi:    { pale: '#f0eef7', main: '#9b8fc0', deep: '#6f6395' },
  massugu: { pale: '#e9f2ef', main: '#69997f', deep: '#41705c' }
};
const VOICE_LABEL = { feminine: '女性的', neutral: '中性的', masculine: '男性的' };

// 操作面と同じ、ひらがなの詩（1文字=1モーラ。'　'は空白）
const POEM = ['あんずよ', 'はなつけ', 'ちぞはやにかがやけ', 'あんずよはなつけ', 'あんずよもえよ', 'ああ　あんずよはなつけ'];

const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
const $ = (id) => document.getElementById(id);

// ---- 花（展示アプリと同じ生成規則） ----
function flowerSVG(moodId, data) {
  const mood = MOODS[moodId] || MOODS.attaka;
  const flat = data ? data.chars.flat() : [];
  const pitches = flat.length ? flat.map(v => v[0]) : [0, 0, 0, 0, 0];
  const vols = flat.length ? flat.map(v => v[2]) : [1];
  const avgVol = vols.reduce((a, b) => a + b, 0) / vols.length;
  const petals = [];
  for (let k = 0; k < 5; k++) {
    const i0 = Math.floor(k * pitches.length / 5);
    const i1 = Math.max(i0 + 1, Math.floor((k + 1) * pitches.length / 5));
    const seg = pitches.slice(i0, i1);
    const avg = seg.reduce((a, b) => a + b, 0) / seg.length;
    const lenN = (clamp(avg, -1.2, 1.2) + 1.2) / 2.4;
    const rx = 9 + 4 * clamp(avgVol, 0.45, 2.2) / 2.2 * 2;
    const ry = 15 + 13 * (0.35 + 0.65 * lenN);
    const ang = -90 + k * 72 + (lenN - 0.5) * 14;
    petals.push(`<g transform="rotate(${ang.toFixed(1)})">
      <ellipse cx="0" cy="${(-12 - ry * 0.55).toFixed(1)}" rx="${rx.toFixed(1)}" ry="${ry.toFixed(1)}" fill="${mood.main}" opacity="0.92"/>
      <ellipse cx="0" cy="${(-12 - ry * 0.42).toFixed(1)}" rx="${(rx * 0.45).toFixed(1)}" ry="${(ry * 0.55).toFixed(1)}" fill="${mood.pale}" opacity="0.55"/>
    </g>`);
  }
  return `<svg viewBox="-50 -50 100 100" xmlns="http://www.w3.org/2000/svg">
    <g>${petals.join('')}</g>
    <circle cx="0" cy="0" r="9.5" fill="${mood.deep}"/>
    <circle cx="0" cy="0" r="3.4" fill="${mood.pale}" opacity="0.8"/>
  </svg>`;
}

// ---- 詩を「その人の読みのかたち」のまま描く（展示アプリと同じ係数） ----
const BASE = 40, SLOT = BASE * 1.18, LINE_SPACE = BASE * 1.85, GAP_PX = 44, PITCH_PX = 56;
const DUR_SX_BASE = 0.45, DUR_SX_RANGE = 0.55;
const PITCH_SY_COEF = 0.34;
const VOL_SIZE_BASE = 0.56, VOL_SIZE_RANGE = 0.52;
const sizeFactor = (vol) => VOL_SIZE_BASE + VOL_SIZE_RANGE * vol;

function renderPoemSVG(data) {
  const lines = POEM.map((text, li) => ({
    chars: [...text].map((ch, ci) => {
      const space = ch === '　' || ch === ' ';
      const v = (data && data.chars[li] && data.chars[li][ci]) || [0, 1, 1];
      return { ch, space, pitch: v[0], dur: v[1], vol: v[2] };
    }),
    gapAfter: (data && data.gaps && data.gaps[li] !== undefined) ? data.gaps[li] : 0.8
  }));

  let y = 0, maxW = 0;
  const linePos = lines.map((line, li) => {
    let x = 0;
    const cps = line.chars.map(c => {
      const w = SLOT * (c.space ? 0.55 : c.dur);
      const cp = { cx: x + w / 2 };
      x += w;
      return cp;
    });
    const pos = { y, lineW: x, cps };
    maxW = Math.max(maxW, x);
    if (li < lines.length - 1) y += LINE_SPACE + line.gapAfter * GAP_PX;
    return pos;
  });

  const margin = BASE * 1.4;
  const W = maxW + margin * 2;
  const H = y + margin * 2.1;
  const els = [];
  lines.forEach((line, li) => {
    const lp = linePos[li];
    const x0 = (W - lp.lineW) / 2;
    const baseY = margin + lp.y;
    els.push(`<line x1="${(x0 - 10).toFixed(1)}" y1="${baseY.toFixed(1)}" x2="${(x0 + lp.lineW + 10).toFixed(1)}" y2="${baseY.toFixed(1)}" stroke="#7a7164" stroke-opacity="0.22" stroke-dasharray="2 7"/>`);
    line.chars.forEach((c, ci) => {
      if (c.space) return;
      const cx = x0 + lp.cps[ci].cx;
      const cy = baseY - c.pitch * PITCH_PX;
      const dy = baseY - cy;
      if (Math.abs(dy) > 5) {
        els.push(`<line x1="${cx.toFixed(1)}" y1="${baseY.toFixed(1)}" x2="${cx.toFixed(1)}" y2="${(cy + Math.sign(dy) * BASE * 0.42).toFixed(1)}" stroke="#d97b4f" stroke-opacity="0.4" stroke-width="1.1"/>
          <circle cx="${cx.toFixed(1)}" cy="${baseY.toFixed(1)}" r="2.6" fill="#d97b4f" fill-opacity="0.5"/>`);
      }
      const sx = DUR_SX_BASE + DUR_SX_RANGE * c.dur;
      const sy = 1 + c.pitch * PITCH_SY_COEF;
      const size = BASE * sizeFactor(c.vol);
      els.push(`<text id="c-${li}-${ci}" transform="translate(${cx.toFixed(1)} ${cy.toFixed(1)}) scale(${sx.toFixed(3)} ${sy.toFixed(3)})" font-size="${size.toFixed(1)}" fill="#2e2a24" text-anchor="middle" dominant-baseline="central">${c.ch}</text>`);
    });
  });
  return `<svg viewBox="0 0 ${W.toFixed(0)} ${H.toFixed(0)}" xmlns="http://www.w3.org/2000/svg">${els.join('')}</svg>`;
}

// ---- 再生（カラオケ式に文字が灯る） ----
let audio = null, rafId = 0;
function setupPlayer(meta) {
  const btn = $('play'), icon = $('play-icon'), label = $('play-label');
  const timing = meta.timing || [];
  let activeEl = null;

  function tick() {
    if (!audio) return;
    const t = audio.currentTime;
    let found = null;
    for (const [li, ci, t0, t1] of timing) {
      if (t >= t0 && t < t1) { found = `c-${li}-${ci}`; break; }
    }
    if (activeEl && activeEl.id !== found) { activeEl.setAttribute('fill', '#2e2a24'); activeEl = null; }
    if (found && (!activeEl || activeEl.id !== found)) {
      const el = document.getElementById(found);
      if (el) { el.setAttribute('fill', '#b85f37'); activeEl = el; }
    }
    rafId = requestAnimationFrame(tick);
  }

  function stopUI() {
    cancelAnimationFrame(rafId);
    if (activeEl) { activeEl.setAttribute('fill', '#2e2a24'); activeEl = null; }
    icon.textContent = '▶';
    label.textContent = 'この読みをきく';
    $('flower').classList.remove('playing');
  }

  btn.addEventListener('click', () => {
    if (audio && !audio.paused) {
      audio.pause(); audio.currentTime = 0;
      stopUI();
      return;
    }
    if (!audio) {
      audio = new Audio(meta.wav);
      audio.addEventListener('ended', stopUI);
    }
    audio.play().then(() => {
      icon.textContent = '■';
      label.textContent = 'とめる';
      $('flower').classList.add('playing');
      rafId = requestAnimationFrame(tick);
    }).catch(() => { /* 再生できない環境では何もしない */ });
  });
}

// ---- 木 — 「みんなの読み」の背景（展示アプリと同じ枝ぶりのモチーフ。画面の縦横にあわせて構図だけ変える） ----
function treeSVG() {
  const branches = [
    'M 40 300 C 120 230, 160 150, 230 90',
    'M 230 90 C 260 40, 340 10, 430 30',
    'M 230 90 C 200 30, 130 0, 60 10',
    'M 150 200 C 230 190, 300 160, 360 110',
    'M 600 300 C 560 220, 540 140, 470 90',
    'M 470 90 C 500 40, 580 10, 660 30'
  ];
  const blossoms = [
    [430, 30, 'voice'], [60, 10, 'echo'], [360, 110, 'echo'],
    [660, 30, 'voice'], [110, 60, 'voice'], [500, 60, 'echo']
  ];
  const dot = (x, y, kind) => {
    const fill = kind === 'echo' ? 'var(--echo)' : 'var(--voice)';
    return `<circle cx="${x}" cy="${y}" r="${5 + (Math.abs(x * y) % 5)}" fill="${fill}" opacity="0.5"/>`;
  };
  return `<svg viewBox="0 0 700 320" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="var(--echo-deep)" stroke-width="2.2" stroke-linecap="round" opacity="0.32">
      ${branches.map(d => `<path d="${d}"/>`).join('')}
    </g>
    <g>${blossoms.map(([x, y, k]) => dot(x, y, k)).join('')}</g>
  </svg>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}

function formatWhen(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  const hm = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  if (sameDay(d, now)) return `きょう ${hm}`;
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  if (sameDay(d, yest)) return `きのう ${hm}`;
  return `${d.getMonth() + 1}月${d.getDate()}日`;
}

// ---- みんなの読み（一覧）。展示アプリの「みんなの読み」と同じ見ため・データ規則 ----
// gridId/subId を渡すことで、フルページの一覧と、QRで開いた歌のすぐ下の一覧の両方に流し込める
async function loadListInto(gridId, subId) {
  const gridEl = $(gridId), subEl = $(subId);
  gridEl.innerHTML = '<div class="lib-empty">よみこんでいます…</div>';
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/readings?select=id,url,params,created_at&or=(params->>app.eq.ecoar,params->>app.eq.anzuyo)&order=created_at.desc&limit=100`,
      { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }
    );
    if (!res.ok) throw new Error('list ' + res.status);
    const rows = await res.json();
    const items = rows.map(row => {
      const p = row.params || {};
      if (p.v !== 2 || !p.data) return null;
      return { id: row.id, name: p.name || 'ななしの読み', mood: p.mood, voice: p.voice, data: p.data, createdAt: Date.parse(row.created_at) };
    }).filter(Boolean);

    if (items.length === 0) {
      subEl.textContent = '読みは、人の数だけ。';
      gridEl.innerHTML = '<div class="lib-empty">まだ誰の読みもありません。<br>展示でのこされた読みが、ここに集まります。</div>';
      return;
    }
    subEl.textContent = `いま、${items.length} の花がさいています。ふれると、その人の読みがひらきます。`;
    gridEl.innerHTML = '';
    for (const it of items) {
      const m = MOODS[it.mood] || MOODS.attaka;
      const a = document.createElement('a');
      a.className = 'lib-card';
      a.href = '?id=' + encodeURIComponent(it.id);
      a.style.background = m.pale;
      a.style.borderColor = m.main + '55';
      const meta = [formatWhen(it.createdAt), VOICE_LABEL[it.voice] ? 'こえ：' + VOICE_LABEL[it.voice] : '']
        .filter(Boolean).join('　');
      a.innerHTML = `
        <span class="lib-flower">${flowerSVG(it.mood, it.data)}</span>
        <span class="lib-body">
          <span class="lib-name">${escapeHtml(it.name)}</span>
          <div class="lib-meta">${meta}</div>
        </span>`;
      gridEl.appendChild(a);
    }
  } catch (e) {
    subEl.textContent = '';
    gridEl.innerHTML = '<div class="lib-empty">とおくのライブラリに、いまは届きません。<br>しばらくしてから、もう一度開いてみてください。</div>';
  }
}

// ---- 起動 ----
(async () => {
  const status = $('status');
  const id = new URLSearchParams(location.search).get('id') || '';
  if (!/^[a-z0-9-]+$/.test(id)) {
    // id なし → みんなの読み（一覧）。展示アプリの画面と同じもの
    status.classList.add('hidden');
    $('list').classList.remove('hidden');
    $('list-tree').innerHTML = treeSVG();
    await loadListInto('list-grid', 'list-sub');
    return;
  }
  try {
    const res = await fetch(STORAGE + id + '.json');
    if (!res.ok) throw new Error('not found');
    const meta = await res.json();
    status.classList.add('hidden');
    $('yomi').classList.remove('hidden');
    // QRから開いたこの歌のすぐ下にも、みんなの読みを並べる
    loadListInto('detail-list-grid', 'detail-list-sub');
    $('flower').innerHTML = flowerSVG(meta.mood, meta.data);
    $('yomi-name').textContent = `「${meta.name || 'ななしの読み'}」`;
    const d = meta.savedAt ? new Date(meta.savedAt) : null;
    $('yomi-meta').textContent = [
      d ? `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日にのこされた読み` : '',
      VOICE_LABEL[meta.voice] ? `こえ：${VOICE_LABEL[meta.voice]}` : ''
    ].filter(Boolean).join('　');
    $('poem').innerHTML = renderPoemSVG(meta.data);
    setupPlayer(meta);
  } catch (e) {
    status.innerHTML = 'この読みは、見つかりませんでした。<br>風にとばされてしまったのかもしれません。';
  }
})();
</script>
</body>
</html>
